name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run coverage test
        run: python3 tests/test_coverage.py

      - name: Build bundle archive
        run: |
          mkdir -p dist
          STAGE=$(mktemp -d)
          mkdir -p "$STAGE/Kazakh-QWERTZ.bundle"
          cp -R Contents "$STAGE/Kazakh-QWERTZ.bundle/"
          cp install.sh uninstall.sh README.md LICENSE "$STAGE/"
          cd "$STAGE"
          zip -r "$GITHUB_WORKSPACE/dist/Kazakh-QWERTZ-${GITHUB_REF_NAME}.zip" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
